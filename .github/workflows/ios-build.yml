name: iOS Build

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

env:
  SECRETS_API: https://apple-pie-sk.heysalad.app

jobs:
  build-ios:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build for Simulator
        run: |
          xcodebuild -workspace ios/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            build

      - name: Run tests
        run: npm test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            ios/build
            **/*.ipa

  build-release:
    runs-on: macos-14
    if: github.ref == 'refs/heads/main'
    needs: build-ios

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Fastlane
        run: brew install fastlane

      - name: Fetch Apple credentials from apple-pie-sk
        env:
          APPLE_PIE_SK_KEY: ${{ secrets.APPLE_PIE_SK_KEY }}
        run: |
          CREDS=$(curl -sf $SECRETS_API/secrets/apple \
            -H "Authorization: Bearer $APPLE_PIE_SK_KEY")

          echo "MATCH_PASSWORD=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['matchPassword'])")" >> $GITHUB_ENV
          echo "MATCH_GIT_URL=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['matchGitUrl'])")" >> $GITHUB_ENV
          echo "APP_STORE_KEY_ID=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['keyId'])")" >> $GITHUB_ENV
          echo "APP_STORE_ISSUER_ID=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['issuerId'])")" >> $GITHUB_ENV
          echo "TEAM_ID=$(echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['teamId'])")" >> $GITHUB_ENV

          # Write p8 key to file for Fastlane
          echo $CREDS | python3 -c "import sys,json; print(json.load(sys.stdin)['keyP8'])" > /tmp/AuthKey.p8

      - name: Run Fastlane Match (fetch certs)
        run: |
          fastlane match appstore \
            --git_url "$MATCH_GIT_URL" \
            --app_identifier "com.heysalad.sally" \
            --readonly true \
            --api_key_path /tmp/api_key.json
        env:
          MATCH_PASSWORD: ${{ env.MATCH_PASSWORD }}

      - name: Build IPA
        run: |
          xcodebuild -workspace ios/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -allowProvisioningUpdates \
            archive

          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build \
            -exportOptionsPlist exportOptions.plist

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file build/App.ipa \
            --apiKey "$APP_STORE_KEY_ID" \
            --apiIssuer "$APP_STORE_ISSUER_ID" \
            --apiKey-path /tmp/AuthKey.p8

      - name: Cleanup secrets
        if: always()
        run: rm -f /tmp/AuthKey.p8 /tmp/api_key.json
